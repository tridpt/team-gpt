<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TeamGPT — Admin</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="admin-wrap" id="admin-wrap">
    <div class="topbar">
      <div class="brand"><span class="dot"></span> TeamGPT · Admin</div>
      <div class="row-actions">
        <a class="btn ghost" href="/">← Back to chat</a>
        <button class="btn" id="new-user-btn">+ New user</button>
      </div>
    </div>

    <p class="error-msg" id="admin-error"></p>

    <!-- Gateway aggregate metrics -->
    <div class="stat-grid" id="stat-grid"></div>

    <!-- Users table -->
    <table>
      <thead>
        <tr>
          <th>User</th>
          <th>Role</th>
          <th>Group</th>
          <th>Today (req / cost)</th>
          <th>All-time (req / cost)</th>
          <th>Daily limits</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="users-body"></tbody>
    </table>

    <!-- Groups -->
    <div class="topbar" style="margin-top:32px">
      <h2 style="margin:0;font-size:18px">Groups &amp; departments</h2>
      <button class="btn" id="new-group-btn">+ New group</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Group</th>
          <th>Members</th>
          <th>Today (req / cost)</th>
          <th>Shared daily limits</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="groups-body"></tbody>
    </table>
  </div>

  <!-- User modal (create / edit) -->
  <div class="modal-backdrop hidden" id="user-modal">
    <div class="modal">
      <h2 id="modal-title">New user</h2>
      <p class="error-msg" id="modal-error"></p>
      <form id="user-form">
        <input type="hidden" id="u-id" />
        <div class="field">
          <label for="u-email">Email</label>
          <input type="email" id="u-email" required />
        </div>
        <div class="field">
          <label for="u-name">Name</label>
          <input type="text" id="u-name" />
        </div>
        <div class="field">
          <label for="u-password">Password <span class="muted" id="pw-hint"></span></label>
          <input type="password" id="u-password" autocomplete="new-password" />
        </div>
        <div class="field">
          <label for="u-role">Role</label>
          <select id="u-role">
            <option value="member">member</option>
            <option value="admin">admin</option>
          </select>
        </div>
        <div class="field">
          <label for="u-default-model">Default model <span class="muted">(optional)</span></label>
          <input type="text" id="u-default-model" placeholder="e.g. gpt-4o-mini" />
        </div>
        <div class="field">
          <label for="u-group">Group <span class="muted">(optional)</span></label>
          <select id="u-group"><option value="">— none —</option></select>
        </div>
        <div class="field">
          <label for="u-req">Daily request limit <span class="muted">(blank = default)</span></label>
          <input type="number" id="u-req" min="0" step="1" />
        </div>
        <div class="field">
          <label for="u-cost">Daily cost limit USD <span class="muted">(blank = default)</span></label>
          <input type="number" id="u-cost" min="0" step="0.01" />
        </div>
        <div class="field" id="disabled-field">
          <label><input type="checkbox" id="u-disabled" /> Disabled</label>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn ghost" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Group modal (create / edit) -->
  <div class="modal-backdrop hidden" id="group-modal">
    <div class="modal">
      <h2 id="group-modal-title">New group</h2>
      <p class="error-msg" id="group-modal-error"></p>
      <form id="group-form">
        <input type="hidden" id="g-id" />
        <div class="field">
          <label for="g-name">Name</label>
          <input type="text" id="g-name" required />
        </div>
        <div class="field">
          <label for="g-req">Shared daily request limit <span class="muted">(blank = unlimited)</span></label>
          <input type="number" id="g-req" min="0" step="1" />
        </div>
        <div class="field">
          <label for="g-cost">Shared daily cost limit USD <span class="muted">(blank = unlimited)</span></label>
          <input type="number" id="g-cost" min="0" step="0.01" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn ghost" id="group-modal-cancel">Cancel</button>
          <button type="submit" class="btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
